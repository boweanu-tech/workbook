<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="80mm" height="55mm" viewBox="0 0 80 55">
  <defs>
    <style><![CDATA[
      .main { stroke:black; stroke-width:0.45; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .thin { stroke:black; stroke-width:0.25; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .dash { stroke:black; stroke-width:0.25; fill:none; stroke-dasharray:1 1.2; stroke-linecap:round; stroke-linejoin:round; }
      .label { font-family:serif; font-size:4px; fill:black; }
      .small-label { font-family:serif; font-size:3.4px; fill:black; }
      .angle-label { font-family:"Latin Modern Math", "Latin Modern Roman", "CMU Serif", "Computer Modern", serif; font-size:3.2px; fill:black; }
      .hatch-fill { fill:url(#hatch); stroke:none; }
    ]]></style>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="2.2" height="2.2">
      <path d="M 0 2.2 L 2.2 0" class="thin"/>
    </pattern>
  </defs>

  <!-- 円とおうぎ形の見本。 -->
  <circle class="main" cx="40" cy="28" r="20"/>
  <path class="hatch-fill" d="M 40 28 L 58.8 21.2 A 20 20 0 0 1 46.8 46.8 Z"/>
  <path class="main" d="M 40 28 L 58.8 21.2 A 20 20 0 0 1 46.8 46.8 Z"/>
  <line class="dash" x1="40" y1="28" x2="40" y2="8"/>
  <path class="thin" d="M 46.6 25.6 A 7 7 0 0 1 42.4 34.6"/>

  <text class="label" x="37" y="31">O</text>
  <text class="label" x="60" y="21">A</text>
  <text class="label" x="47" y="50">B</text>
  <text class="angle-label" x="47" y="32">100°</text>
  <text class="small-label" x="22" y="52">おうぎ形・弧・半径</text>
</svg>
