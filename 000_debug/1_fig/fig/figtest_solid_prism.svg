<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="80mm" height="55mm" viewBox="0 0 80 55">
  <defs>
    <style><![CDATA[
      .main { stroke:black; stroke-width:0.45; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .thin { stroke:black; stroke-width:0.25; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .dash { stroke:black; stroke-width:0.25; fill:none; stroke-dasharray:1 1.2; stroke-linecap:round; stroke-linejoin:round; }
      .label { font-family:serif; font-size:4px; fill:black; }
      .small-label { font-family:serif; font-size:3.4px; fill:black; }
      .light-fill { fill:#eeeeee; stroke:none; }
      .mid-fill { fill:#dddddd; stroke:none; }
    ]]></style>
  </defs>

  <!-- 直方体風の立体図。見えている辺は main、奥の辺は dash。 -->
  <path class="light-fill" d="M 18 38 L 48 38 L 62 26 L 32 26 Z"/>
  <path class="mid-fill" d="M 48 18 L 62 8 L 62 26 L 48 38 Z"/>
  <path class="light-fill" d="M 18 20 L 48 20 L 48 38 L 18 38 Z"/>

  <path class="main" d="M 18 20 L 48 20 L 62 8 L 32 8 Z"/>
  <path class="main" d="M 18 20 L 18 38 L 48 38 L 62 26 L 62 8"/>
  <path class="main" d="M 48 20 L 48 38"/>
  <path class="main" d="M 32 8 L 32 26 L 62 26"/>
  <path class="main" d="M 18 38 L 32 26"/>
  <path class="dash" d="M 18 20 L 32 8"/>
  <path class="dash" d="M 32 26 L 18 20"/>
  <path class="dash" d="M 32 26 L 32 8"/>

  <text class="label" x="15" y="19">A</text>
  <text class="label" x="49" y="19">B</text>
  <text class="label" x="64" y="9">C</text>
  <text class="label" x="31" y="7">D</text>
  <text class="label" x="14" y="43">E</text>
  <text class="label" x="49" y="43">F</text>
  <text class="small-label" x="25" y="48">立体図形の見本</text>
</svg>
