<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="160mm" height="110mm" viewBox="0 0 160 110">

  <!--
  教材SVGテンプレート。

  基本方針:
  - viewBox の 1 単位を 1mm として扱う。
  - TeX 側では原則として等倍または小さな倍率変更で使う。
  - 図形本体は .main、補助線は .thin、点線は .dash を使う。
  - 点は r=0.4 を標準とする。ただし、多角形の頂点には原則として黒点を打たない。
  - 黒点は座標平面上の点・実験装置の明示点など、点そのものを強調したい場合だけ使う。
  - 通常ラベルは .label、数式ラベルは .math-label、軸ラベルは .axis-label を使う。
  - 領域を示すときは斜線パターンを使わず、必要なら .light-fill や .mid-fill で薄く塗る。
  - このファイルは Inkscape で見て部品の雰囲気を確認し、
    テキストエディタでは主に下の <style> を調整する。

  作図精度に関するルール:
  - 角度弧は折れ線で近似しない。必ず SVG の A コマンドで円弧として描く。
  - 角度弧は「中心点・半径・2本の辺方向ベクトル」から始点と終点を計算して描く。
  - 角度弧を見た目で手置きしない。頂点中心の扇形弧になることを確認する。
  - 補助的な破線の角度弧も、必要なら A コマンドで描く。曖昧な補助弧は置かない。
  - 直角記号は、頂点から2辺方向へ同じ距離だけ進み、辺方向ベクトルから計算して置く。
  - 等辺印は、辺の中点・辺方向ベクトル・法線ベクトルから計算して置く。
  - 平行記号は、対象線分の中点と方向ベクトルから計算し、主線が記号の中央を貫くように置く。
  - 関数グラフでは、曲線・点・補助線・塗り領域を同じ数学座標から同じSVG座標変換で描く。
  - グラフの軸は .main、曲線・補助線・角度弧は原則 .thin を使う。
  - 図形問題の多角形は、頂点ドットを打たず、線とラベルだけで示す。
  - 見た目だけで線・弧・記号を配置しない。必要な交点・角度・中点は先に計算する。
  -->

  <defs>
    <style><![CDATA[
      /* ========= 全体・ガイド ========= */
      .page-border {
        stroke: #bbbbbb;
        stroke-width: 0.2;
        fill: none;
      }
      .guide {
        stroke: #cccccc;
        stroke-width: 0.15;
        fill: none;
        stroke-dasharray: 1 1;
      }
      .section-title {
        font-family: serif;
        font-size: 4px;
        font-weight: bold;
        fill: black;
      }
      .note {
        font-family: serif;
        font-size: 3px;
        fill: #555555;
      }

      /* ========= 線 ========= */
      .main {
        stroke: black;
        stroke-width: 0.45;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .thin {
        stroke: black;
        stroke-width: 0.25;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .dash {
        stroke: black;
        stroke-width: 0.25;
        fill: none;
        stroke-dasharray: 1 1.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .bold {
        stroke: black;
        stroke-width: 0.70;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* ========= 点・文字 ========= */
      .point {
        fill: black;
        stroke: none;
      }
      .label {
        font-family: serif;
        font-size: 4px;
        fill: black;
      }
      .small-label {
        font-family: serif;
        font-size: 3.4px;
        fill: black;
      }
      .math-label {
        font-family: "Latin Modern Math", "Latin Modern Roman", "CMU Serif", "Computer Modern", serif;
        font-size: 4px;
        font-style: italic;
        fill: black;
      }
      .axis-label {
        font-family: "Latin Modern Math", "Latin Modern Roman", "CMU Serif", "Computer Modern", serif;
        font-size: 4px;
        font-style: normal;
        fill: black;
      }
      .angle-label {
        font-family: "Latin Modern Math", "Latin Modern Roman", "CMU Serif", "Computer Modern", serif;
        font-size: 3.2px;
        fill: black;
      }

      /* ========= 塗り ========= */
      .white-shape {
        fill: white;
        stroke: black;
        stroke-width: 0.45;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .light-fill {
        fill: #eeeeee;
        stroke: none;
      }
      .mid-fill {
        fill: #dddddd;
        stroke: none;
      }
    ]]></style>

    <!-- 細めの矢印。軸線の先端が三角形から出ないよう refX を少し小さくする。 -->
    <marker id="arrow" markerWidth="7" markerHeight="4" refX="5.8" refY="2"
            orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 7 2 L 0 4 Z" fill="black"/>
    </marker>
  </defs>

  <!-- 描画可能範囲の目安。実際の図では削除してもよい。 -->
  <rect class="page-border" x="1" y="1" width="158" height="108"/>
  <rect class="guide" x="5" y="5" width="150" height="100"/>

  <!-- ========= 1. 線の見本 ========= -->
  <text class="section-title" x="8" y="10">1. 線の見本</text>
  <line class="main" x1="10" y1="18" x2="55" y2="18"/>
  <text class="note" x="58" y="19">.main 通常線</text>
  <line class="thin" x1="10" y1="25" x2="55" y2="25"/>
  <text class="note" x="58" y="26">.thin 補助線・角度弧・曲線</text>
  <line class="dash" x1="10" y1="32" x2="55" y2="32"/>
  <text class="note" x="58" y="33">.dash 点線 短め</text>
  <line class="bold" x1="10" y1="39" x2="55" y2="39"/>
  <text class="note" x="58" y="40">.bold 強調線</text>

  <!-- ========= 2. 点・ラベルの見本 ========= -->
  <text class="section-title" x="8" y="52">2. 点・ラベル</text>
  <circle class="point" cx="18" cy="62" r="0.4"/>
  <text class="label" x="14" y="58">A</text>
  <circle class="point" cx="38" cy="62" r="0.4"/>
  <text class="label" x="40" y="64">B</text>
  <line class="thin" x1="18" y1="62" x2="38" y2="62"/>
  <text class="math-label" x="25" y="69">x</text>
  <text class="small-label" x="48" y="62">座標点などは r=0.4</text>
  <text class="small-label" x="48" y="67">多角形の頂点は黒点なし</text>

  <!-- ========= 3. 角度・直角・等辺・平行記号 ========= -->
  <text class="section-title" x="88" y="10">3. 記号の見本</text>

  <!-- 三角形と角度弧。多角形の頂点には黒点を打たない。 -->
  <path class="main" d="M 95 38 L 120 18 L 142 38 Z"/>
  <text class="label" x="91" y="43">A</text>
  <text class="label" x="118" y="15">B</text>
  <text class="label" x="144" y="43">C</text>
  <path class="thin" d="M 98.12 35.50 A 4 4 0 0 1 99 38"/>
  <text class="angle-label" x="100" y="37">60°</text>

  <!-- 直角記号。小さめにする。 -->
  <path class="main" d="M 123 47 L 123 30 L 146 47 Z"/>
  <path class="thin" d="M 123 44.5 L 125.5 44.5 L 125.5 47"/>
  <text class="note" x="126" y="52">直角記号</text>

  <!-- 等辺記号。 / や // は長さが等しいことを表す。 -->
  <line class="main" x1="95" y1="86" x2="125" y2="86"/>
  <path class="thin" d="M 109.4 85 L 110.6 87"/>
  <line class="main" x1="95" y1="94" x2="125" y2="94"/>
  <path class="thin" d="M 108.8 93 L 110.0 95"/>
  <path class="thin" d="M 110.1 93 L 111.3 95"/>
  <text class="note" x="130" y="88">/ は等辺印</text>
  <text class="note" x="130" y="96">// は2本印</text>

  <!-- 平行記号。くの字 > を線の中央に置く。 -->
  <line class="main" x1="12" y1="86" x2="52" y2="78"/>
  <line class="main" x1="14" y1="100" x2="54" y2="92"/>
  <g class="thin" transform="translate(32,82) rotate(-11.3)">
    <path d="M -1.1 -0.9 L -0.1 0 L -1.1 0.9"/>
    <path d="M 0.2 -0.9 L 1.2 0 L 0.2 0.9"/>
  </g>
  <g class="thin" transform="translate(34,96) rotate(-11.3)">
    <path d="M -1.1 -0.9 L -0.1 0 L -1.1 0.9"/>
    <path d="M 0.2 -0.9 L 1.2 0 L 0.2 0.9"/>
  </g>
  <text class="note" x="58" y="90">平行記号は くの字</text>
  <text class="note" x="58" y="95">複数組は個数で区別</text>
  <g class="thin" transform="translate(66,100)">
    <path d="M 0 -0.8 L 0.9 0 L 0 0.8"/>
    <path d="M 4.0 -0.8 L 4.9 0 L 4.0 0.8"/>
    <path d="M 5.3 -0.8 L 6.2 0 L 5.3 0.8"/>
    <path d="M 9.0 -0.8 L 9.9 0 L 9.0 0.8"/>
    <path d="M 10.3 -0.8 L 11.2 0 L 10.3 0.8"/>
    <path d="M 11.6 -0.8 L 12.5 0 L 11.6 0.8"/>
  </g>

  <!-- ========= 4. 座標軸・矢印 ========= -->
  <text class="section-title" x="8" y="77">4. 座標軸・矢印</text>
  <line class="main" x1="12" y1="72" x2="70" y2="72" marker-end="url(#arrow)"/>
  <line class="main" x1="12" y1="72" x2="12" y2="48" marker-end="url(#arrow)"/>
  <text class="axis-label" x="72" y="73">x</text>
  <text class="axis-label" x="9" y="47">y</text>
  <path class="thin" d="M 18 70 C 30 50, 48 50, 64 66"/>
  <circle class="point" cx="42" cy="55" r="0.4"/>
  <text class="label" x="44" y="56">P</text>

  <!-- ========= 5. 塗り ========= -->
  <text class="section-title" x="88" y="55">5. 塗り</text>
  <rect class="white-shape" x="90" y="61" width="18" height="12"/>
  <text class="note" x="90" y="78">white-shape</text>
  <rect class="light-fill" x="115" y="61" width="18" height="12"/>
  <rect class="main" x="115" y="61" width="18" height="12"/>
  <text class="note" x="115" y="78">light-fill</text>
  <rect class="mid-fill" x="140" y="61" width="14" height="12"/>
  <rect class="main" x="140" y="61" width="14" height="12"/>
  <text class="note" x="139" y="78">mid-fill</text>

  <!-- ========= 6. 小さな完成例 ========= -->
  <text class="section-title" x="88" y="84">6. 完成例</text>
  <path class="light-fill" d="M 92 102 L 116 84 L 148 102 Z"/>
  <path class="main" d="M 92 102 L 116 84 L 148 102 Z"/>
  <line class="dash" x1="116" y1="84" x2="116" y2="102"/>
  <path class="thin" d="M 95.2 99.6 A 4 4 0 0 1 96 102"/>
  <text class="label" x="88" y="107">A</text>
  <text class="label" x="114" y="81">B</text>
  <text class="label" x="150" y="107">C</text>
</svg>
