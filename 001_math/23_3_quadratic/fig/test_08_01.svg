<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="70mm" height="48mm" viewBox="0 0 320 220" version="1.1">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111"/>
    </marker>
    <style><![CDATA[
      .edge { fill: none; stroke: #111111; stroke-width: 2.3; stroke-linecap: round; stroke-linejoin: round; }
      .thin { fill: none; stroke: #111111; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
      .dash { fill: none; stroke: #555555; stroke-width: 1.4; stroke-dasharray: 5 4; stroke-linecap: round; stroke-linejoin: round; }
      .move { fill: none; stroke: #111111; stroke-width: 1.6; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .point { fill: #111111; stroke: none; }
      .label { font-family: "Latin Modern Roman", "Times New Roman", serif; font-size: 18px; fill: #111111; }
      .small { font-family: "Latin Modern Roman", "Times New Roman", serif; font-size: 15px; fill: #111111; }
      .dim { font-family: "Latin Modern Roman", "Times New Roman", serif; font-size: 16px; fill: #111111; }
    ]]></style>
  </defs>

  <!-- A right triangle ABC with P moving from A to B and Q moving from B to C. -->
  <path class="edge" d="M 72 38 L 72 170 L 252 170 Z"/>

  <!-- Right angle mark at B. -->
  <path class="thin" d="M 72 148 L 94 148 L 94 170"/>

  <!-- Current positions of P and Q. -->
  <circle class="point" cx="72" cy="105" r="2.7"/>
  <circle class="point" cx="150" cy="170" r="2.7"/>

  <!-- Segment PB and BQ, emphasized lightly. -->
  <path class="thin" d="M 72 105 L 72 170 L 150 170"/>

  <!-- Movement arrows. -->
  <path class="move" d="M 51 55 L 51 132"/>
  <path class="move" d="M 102 191 L 184 191"/>

  <!-- Dimension labels. -->
  <text class="dim" x="28" y="108">12 cm</text>
  <text class="dim" x="145" y="214">16 cm</text>

  <!-- Speed labels. -->
  <text class="small" x="16" y="48">1 cm/s</text>
  <text class="small" x="123" y="188">2 cm/s</text>

  <!-- Vertex and point labels. -->
  <text class="label" x="58" y="34">A</text>
  <text class="label" x="55" y="193">B</text>
  <text class="label" x="258" y="176">C</text>
  <text class="label" x="80" y="108">P</text>
  <text class="label" x="147" y="161">Q</text>
</svg>
