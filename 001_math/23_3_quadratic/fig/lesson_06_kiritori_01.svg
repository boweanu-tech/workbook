<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="70mm"
   height="45mm"
   viewBox="0 0 70 45"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <!--
  図形教材SVG。
  - viewBox の 1 単位を 1mm として扱う。
  - 縦10cm、横16cmの長方形の周囲に同じ幅 x cm の帯を残し、中央の長方形を切り取る問題用。
  - 外形は 16:10 の比で描き、帯幅は模式的にやや広めに描く。
  -->
  <defs>
    <style><![CDATA[
      .main {
        stroke: black;
        stroke-width: 0.45;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .thin {
        stroke: black;
        stroke-width: 0.25;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .dash {
        stroke: black;
        stroke-width: 0.25;
        fill: none;
        stroke-dasharray: 1 1.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .light-fill {
        fill: #eeeeee;
        stroke: none;
      }
      .label {
        font-family: serif;
        font-size: 4px;
        fill: black;
      }
      .small-label {
        font-family: serif;
        font-size: 3.3px;
        fill: black;
      }
      .math-label {
        font-family: "Latin Modern Math", "Latin Modern Roman", "CMU Serif", "Computer Modern", serif;
        font-size: 4px;
        font-style: italic;
        fill: black;
      }
    ]]></style>
  </defs>

  <!-- 外側の長方形：横16cm、縦10cm -->
  <rect class="light-fill" x="9" y="6" width="52" height="32.5" />
  <!-- 中央を切り取る部分 -->
  <rect x="17" y="14" width="36" height="16.5" fill="white" stroke="none" />

  <!-- 外枠と切り取り線 -->
  <rect class="main" x="9" y="6" width="52" height="32.5" />
  <rect class="main" x="17" y="14" width="36" height="16.5" />

  <!-- 帯幅 x の補助線 -->
  <line class="thin" x1="17" y1="8.4" x2="17" y2="12.6" />
  <line class="thin" x1="17" y1="10.5" x2="25" y2="10.5" />
  <line class="thin" x1="25" y1="8.4" x2="25" y2="12.6" />
  <text class="math-label" x="20.1" y="9.4">x</text>

  <line class="thin" x1="55.4" y1="14" x2="59.6" y2="14" />
  <line class="thin" x1="57.5" y1="14" x2="57.5" y2="22" />
  <line class="thin" x1="55.4" y1="22" x2="59.6" y2="22" />
  <text class="math-label" x="59.8" y="19.1">x</text>

  <!-- ラベル -->
  <text class="small-label" x="29.2" y="23.1">切り取る</text>
  <text class="small-label" x="25.8" y="34.7">残った帯の面積 52cm²</text>

  <!-- 横 16cm の寸法線 -->
  <line class="thin" x1="9" y1="41" x2="61" y2="41" />
  <line class="thin" x1="9" y1="39.2" x2="9" y2="42.8" />
  <line class="thin" x1="61" y1="39.2" x2="61" y2="42.8" />
  <text class="label" x="30.1" y="44.1">16cm</text>

  <!-- 縦 10cm の寸法線 -->
  <line class="thin" x1="5" y1="6" x2="5" y2="38.5" />
  <line class="thin" x1="3.2" y1="6" x2="6.8" y2="6" />
  <line class="thin" x1="3.2" y1="38.5" x2="6.8" y2="38.5" />
  <text class="label" x="0.8" y="23.5" transform="rotate(-90 0.8 23.5)">10cm</text>
</svg>
