<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="80mm" height="58mm" viewBox="0 0 360 260" version="1.1">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#222222"/>
    </marker>
    <style><![CDATA[
      .edge { fill: none; stroke: #111111; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
      .thin { fill: none; stroke: #111111; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
      .dash { fill: none; stroke: #111111; stroke-width: 1.7; stroke-dasharray: 5 4; stroke-linecap: round; stroke-linejoin: round; }
      .aux { fill: none; stroke: #555555; stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; }
      .face { fill: #e6e6e6; stroke: none; opacity: 0.55; }
      .point { fill: #111111; stroke: none; }
      .label { font-family: "Latin Modern Roman", "Times New Roman", serif; font-size: 17px; fill: #111111; }
      .small { font-family: "Latin Modern Roman", "Times New Roman", serif; font-size: 15px; fill: #111111; }
      .dim { font-family: "Latin Modern Roman", "Times New Roman", serif; font-size: 16px; fill: #111111; }
    ]]></style>
  </defs>

  <!-- Points used in the drawing:
       A(90,55), B(90,175), C(250,175)
       D(150,20), E(150,140), F(310,140)
       P is on DE, Q is on EF, and DP=EQ is shown by matching tick marks. -->

  <!-- Highlight the triangular face DPQ of the tetrahedron B-DPQ. -->
  <polygon class="face" points="150,20 150,80 210,140"/>

  <!-- Right triangular prism ABC-DEF. -->
  <path class="edge" d="M 90 55 L 90 175 L 250 175 Z"/>
  <path class="edge" d="M 150 20 L 150 140 L 310 140 Z"/>
  <path class="edge" d="M 90 55 L 150 20"/>
  <path class="edge" d="M 90 175 L 150 140"/>
  <path class="edge" d="M 250 175 L 310 140"/>

  <!-- Edges of the tetrahedron B-DPQ. -->
  <path class="thin" d="M 90 175 L 150 20"/>
  <path class="thin" d="M 90 175 L 150 80"/>
  <path class="thin" d="M 90 175 L 210 140"/>
  <path class="thin" d="M 150 20 L 150 80 L 210 140 Z"/>

  <!-- Right angle mark at B. -->
  <path class="thin" d="M 90 154 L 111 154 L 111 175"/>

  <!-- Tick marks showing DP=EQ. -->
  <path class="thin" d="M 143 50 L 157 50"/>
  <path class="thin" d="M 180 133 L 180 147"/>
  <text class="small" x="190" y="116">DP=EQ</text>

  <!-- Dimension labels. -->
  <text class="dim" x="56" y="119">6 cm</text>
  <text class="dim" x="158" y="200">8 cm</text>
  <text class="dim" x="111" y="28">5 cm</text>

  <!-- Vertex labels. -->
  <text class="label" x="72" y="52">A</text>
  <text class="label" x="71" y="194">B</text>
  <text class="label" x="252" y="194">C</text>
  <text class="label" x="151" y="18">D</text>
  <text class="label" x="132" y="148">E</text>
  <text class="label" x="315" y="144">F</text>
  <circle class="point" cx="150" cy="80" r="2.6"/>
  <text class="label" x="157" y="83">P</text>
  <circle class="point" cx="210" cy="140" r="2.6"/>
  <text class="label" x="212" y="160">Q</text>
</svg>
